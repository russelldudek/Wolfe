name: Materialize and publish candidate vision

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: wolfe-release
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize readable campaign source
        shell: bash
        run: |
          set -euo pipefail
          cat .release/package.part.* > /tmp/wolfe-source.b64
          base64 --decode /tmp/wolfe-source.b64 > /tmp/wolfe-source.zip
          rm -rf .release
          rm -f .github/workflows/materialize.yml
          unzip -o /tmp/wolfe-source.zip -d .

      - name: Generate final application PDFs
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install weasyprint pypdf beautifulsoup4
          python generate_pdfs.py

      - name: Validate campaign contracts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader

          expected = {
              "docs/Russell-Dudek-Wolfe-Resume.pdf": 2,
              "docs/Russell-Dudek-Wolfe-Cover-Letter.pdf": 1,
              "docs/Russell-Dudek-Wolfe-Interview-Thesis-Brief.pdf": 3,
              "docs/Russell-Dudek-Wolfe-120-Day-Entry-Plan.pdf": 3,
              "docs/Russell-Dudek-Wolfe-Data-Use-Card-Standard.pdf": 2,
          }
          for filename, pages in expected.items():
              path = Path(filename)
              assert path.exists() and path.stat().st_size > 10_000, filename
              actual = len(PdfReader(path).pages)
              assert actual == pages, f"{filename}: expected {pages}, got {actual}"

          required = [
              "index.html", "styles.css", "app.js", "resume.html",
              "cover-letter.html", "interview-brief.html", "120-day-plan.html",
              "data-use-card.html", "brand-intelligence.md",
              "assets/brand/wolfe-logo.png", ".github/workflows/deploy-pages.yml",
          ]
          for filename in required:
              path = Path(filename)
              assert path.exists() and path.stat().st_size > 0, filename
          PY
          if grep -R -i -E 'role[[:space:]_-]*forge' \
            --exclude-dir=.git \
            --include='*.html' --include='*.css' --include='*.js' \
            --include='*.md' --include='*.txt' --include='*.json' .; then
            echo "Forbidden private system attribution found."
            exit 1
          fi
          sha256sum \
            index.html styles.css app.js resume.html cover-letter.html \
            interview-brief.html 120-day-plan.html data-use-card.html \
            docs/*.pdf assets/brand/wolfe-logo.png > SHA256SUMS

      - name: Commit complete campaign to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Russell Dudek"
          git config user.email "russelldudek@users.noreply.github.com"
          git add -A
          git commit -m "Publish Wolfe candidate vision"
          git push origin HEAD:main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload candidate vision
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy candidate vision
        id: deployment
        uses: actions/deploy-pages@v4
