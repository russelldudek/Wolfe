name: Deploy Wolfe candidate vision

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify exact live campaign files
        shell: bash
        run: |
          set -euo pipefail
          site="https://russelldudek.github.io/Wolfe/"
          files=(
            index.html
            styles.css
            app.js
            resume.html
            cover-letter.html
            interview-brief.html
            120-day-plan.html
            data-use-card.html
            assets/brand/wolfe-logo.png
            docs/Russell-Dudek-Wolfe-Resume.pdf
            docs/Russell-Dudek-Wolfe-Cover-Letter.pdf
            docs/Russell-Dudek-Wolfe-Interview-Thesis-Brief.pdf
            docs/Russell-Dudek-Wolfe-120-Day-Entry-Plan.pdf
            docs/Russell-Dudek-Wolfe-Data-Use-Card-Standard.pdf
          )
          mkdir -p /tmp/wolfe-live
          for attempt in $(seq 1 18); do
            all_ok=true
            for file in "${files[@]}"; do
              mkdir -p "/tmp/wolfe-live/$(dirname "$file")"
              if ! curl --fail --silent --show-error --location \
                "${site}${file}?source=${GITHUB_SHA}" \
                --output "/tmp/wolfe-live/${file}"; then
                all_ok=false
                break
              fi
              if ! cmp --silent "$file" "/tmp/wolfe-live/${file}"; then
                all_ok=false
                break
              fi
            done
            if [ "$all_ok" = true ]; then
              break
            fi
            if [ "$attempt" -eq 18 ]; then
              echo "Live deployment did not converge to the audited source."
              exit 1
            fi
            sleep 5
          done
          grep -Fq "Every AI decision should know the terms of its data." /tmp/wolfe-live/index.html
          grep -Fq "VP, Data Platform &amp; Knowledge" /tmp/wolfe-live/index.html

      - name: Commit successful live-verification receipt
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p qa
          cat > qa/pages-live.txt <<EOF
          Live site: https://russelldudek.github.io/Wolfe/
          Deployment source: ${GITHUB_SHA}
          Deployed from: main
          Exact live files verified: 14
          Candidate vision: Wolfe — VP, Data Platform & Knowledge
          EOF
          git config user.name "Russell Dudek"
          git config user.email "russelldudek@users.noreply.github.com"
          git add qa/pages-live.txt
          git commit -m "[skip ci] Record verified Wolfe Pages deployment"
          git push origin HEAD:main
